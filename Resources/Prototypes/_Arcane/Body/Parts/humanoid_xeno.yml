- type: entity
  id: PartHumanoidXeno
  parent: [BaseItem, BasePart]
  name: "xenomorph body part"
  abstract: true
  components:
  - type: Icon
    sprite: _Arcane/Mobs/Species/HumanoidXeno/parts.rsi
    state: torso_m
  - type: BodyPart
    species: HumanoidXeno
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 3
      - ReagentId: Blood
        Quantity: 10
  - type: WoundableVisuals
    damageOverlayGroups:
      Brute:
        sprite: _Shitmed/Mobs/Effects/brute_damage.rsi
        color: "#44944A"
      Burn:
        sprite: _Shitmed/Mobs/Effects/burn_damage.rsi

