- type: entity
  id: BaseHumanoidXenoOrganUnGibbable
  parent: BaseItem
  abstract: true
  components:
  - type: Sprite
    sprite: _Arcane/Mobs/Species/HumanoidXeno/organs.rsi
  - type: Organ
  - type: Extractable
    grindableSolutionName: organ
  - type: SolutionContainerManager
    solutions:
      organ:
        reagents:
        - ReagentId: Nutriment
          Quantity: 10
      food:
        maxVol: 5
        reagents:
        - ReagentId: FluorosulfuricAcid
          Quantity: 5
  - type: FlavorProfile
    flavors:
      - people
  - type: Tag
    tags:
      - Meat

- type: entity
  id: BaseHumanoidXenoOrgan
  parent: BaseHumanoidXenoOrganUnGibbable
  abstract: true
  components:
  - type: Gibbable

- type: entity
  id: OrganHumanoidXenoBrain
  parent: [BaseHumanoidXenoOrgan, OrganHumanBrain]
  name: brain
  description: The nexus of the alien mind. Thoughts you don't want to know.
  components:
  - type: Sprite
    state: brain
  - type: Organ
  - type: Input
    context: "ghost"
  - type: Brain
  - type: InputMover
  - type: Examiner
  - type: BlockMovement
  - type: BadFood
  - type: Tag
    tags:
    - Meat
  - type: SolutionContainerManager
    solutions:
      organ:
        reagents:
        - ReagentId: Nutriment
          Quantity: 10
      food:
        maxVol: 5
        reagents:
        - ReagentId: GreyMatter
          Quantity: 5
  - type: FlavorProfile
    flavors:
    - people

- type: entity
  id: OrganHumanoidXenoLungs
  parent: [BaseHumanoidXenoOrgan]
  name: lungs
  description: They filter oxygen from the atmosphere and channel it into the bloodstream, where it is used as an electron carrier.
  components:
  - type: Sprite
    layers:
      - state: lung-l
      - state: lung-r
  - type: SolutionContainerManager
    solutions:
      organ:
        reagents:
        - ReagentId: Nutriment
          Quantity: 10
      food:
        maxVol: 5
        reagents:
        - ReagentId: FluorosulfuricAcid
          Quantity: 5

- type: entity
  id: OrganHumanoidXenoHeart
  parent: [BaseHumanoidXenoOrgan, OrganHumanHeart]
  name: xenomorph heart
  description: A powerful organ that pumps acidic blood through tough tissues and provides incredible stamina and strength to every xenomorph.
  components:
  - type: Sprite
    state: heart-off
  - type: Metabolizer
    maxPoisonsProcessable: 2
    metabolizerTypes: [Animal]
    groups:
    - id: Medicine
    - id: Poison
    - id: Narcotic

- type: entity
  id: OrganHumanoidXenoStomach
  parent: [BaseHumanoidXenoOrgan, OrganHumanStomach]
  name: stomach
  description: A voracious pit.
  components:
  - type: Sprite
    state: stomach
  - type: SolutionContainerManager
    solutions:
      stomach:
        maxVol: 100
      food:
        maxVol: 5
        reagents:
        - ReagentId: FluorosulfuricAcid
          Quantity: 5
  - type: Stomach
  - type: Metabolizer
    maxPoisonsProcessable: 3
    metabolizerTypes: [Animal]
    groups:
    - id: Food
    - id: Drink

- type: entity
  id: OrganHumanoidXenoLiver
  parent: [BaseHumanoidXenoOrgan, OrganHumanLiver]
  name: liver
  description: A powerful detoxifier that neutralizes dangerous substances with ease.
  components:
  - type: Sprite
    state: liver
  - type: Metabolizer
    maxPoisonsProcessable: 1
    metabolizerTypes: [Human]
    groups:
    - id: Alcohol
      rateModifier: 0.1

- type: entity
  id: OrganHumanoidXenoKidneys
  parent: [BaseHumanoidXenoOrgan, OrganHumanKidneys]
  name: kidneys
  description: Paired filters, ruthlessly taking out anything superfluous.
  components:
  - type: Sprite
    layers:
      - state: kidney-l
      - state: kidney-r
  - type: Metabolizer
    maxPoisonsProcessable: 5
    metabolizerTypes: [Human]
    removeEmpty: true

- type: entity
  id: OrganHumanoidXenoEyes
  parent: [BaseHumanoidXenoOrgan, OrganHumanEyes]
  name: eyes
  description: Eyes. They see.
  components:
  - type: Sprite
    sprite: _Arcane/Mobs/Species/HumanoidXeno/organs.rsi
    layers:
      - state: nerve
