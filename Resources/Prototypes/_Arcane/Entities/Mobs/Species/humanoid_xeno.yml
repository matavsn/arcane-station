        Heat: 3
  - type: Speech
    speechVerb: LargeMob
    allowedEmotes: [ 'Hiss', 'Roars', 'Rumbles', 'Growl', 'Scream' ]
  - type: MeleeWeapon
    hidden: true
    soundHit:
      collection: Punch
    angle: 30
    animation: WeaponArcClaw
    attackRate: 1
    damage:
      types:
        Blunt: 5
        Slash: 5
        Caustic: 1
  - type: LizardAccent
  - type: Bloodstream
    bloodReagent: FluorosulfuricAcidHumanoidXeno
    bloodMaxVolume: 300
  - type: ProtectedFromStepTriggers
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: HumanoidXenomorph
  - type: NightVision
    color: "#44944A"
    toggleAction: ToggleNightVision
# Старая система оффов. Здесь испольуется WoundableVisuals, которая не требует оффов и работает на всех частях тела. Оверлэй пропиывюатся в самих огранах.
#  - type: DamageVisuals
#    damageOverlayGroups:
#      Brute:
#        sprite: Mobs/Effects/brute_damage.rsi
#        color: "#44944A"
  - type: Stamina
    critThreshold: 125
  - type: Hunger
    baseDecayRate: 0.08
  - type: Thirst
    baseDecayRate: 0.15
  - type: Icon
    sprite: _Arcane/Mobs/Species/HumanoidXeno/parts.rsi
    state: full
  - type: Perishable
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatXeno
      amount: 5
  - type: Body
    prototype: HumanoidXeno
    requiredLegs: 2
  - type: Inventory
    speciesId: reptilian
    templateId: humanoidxeno
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _White/Mobs/Species/displacement.rsi
            state: jumpsuit-female
      shoes:
        sizeMaps:
          32:
            sprite: _White/Mobs/Species/displacement.rsi
            state: shoes
      socks:
        sizeMaps:
          32:
            sprite: _White/Mobs/Species/displacement.rsi
            state: shoes
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _White/Mobs/Species/displacement.rsi
            state: jumpsuit
      shoes:
        sizeMaps:
          32:
            sprite: _White/Mobs/Species/displacement.rsi
            state: shoes
      socks:
        sizeMaps:
          32:
            sprite: _White/Mobs/Species/displacement.rsi
            state: shoes
    maleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _White/Mobs/Species/displacement.rsi
            state: jumpsuit
      shoes:
        sizeMaps:
          32:
            sprite: _White/Mobs/Species/displacement.rsi
            state: shoes
      socks:
        sizeMaps:
          32:
            sprite: _White/Mobs/Species/displacement.rsi
            state: shoes
