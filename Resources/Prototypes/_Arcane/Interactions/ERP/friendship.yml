- type: panelInteraction
  id: Handshake
  category: Hands
  name: Пожать руку
  range: 1
  sounds:
  - /Audio/_Arcane/Interactions/handshake.ogg
  messages:
  - пожимает руку $target.
  - дружески жмёт руку $target.
  - принимает рукопожатие $target.
  - жмёт руку $target.
  - берёт $target за руку и пожимает её.
  icon: _Arcane/Interface/ErpPanel/friendly.png

- type: panelInteraction
  id: FingerTap
  category: Back
  name: Массировать спину
  range: 1
  sounds:
  - /Audio/_Arcane/Interactions/pat1.ogg
  - /Audio/_Arcane/Interactions/pat2.ogg
  messages:
  - тыкает спину $target вдоль позвоночника.
  - мнёт лопатки $target.
  - разминает спину $target.
  - проминает позвоночник $target.
  - делает $target массаж спины.
  - легонько "рубит" спину $target.
  - прогибает спину $target.
  - мнёт большими пальцами между лопатками $target.
  icon: _Arcane/Interface/ErpPanel/friendly_finger_tap.png

- type: panelInteraction
  id: TailPat
  category: Tail
  name: Погладить хвост
  range: 1
  sounds:
  - /Audio/_Arcane/Interactions/friction1.ogg
  - /Audio/_Arcane/Interactions/friction2.ogg
  messages:
  - проводит рукой по хвосту $target.
  - поглаживает хвост $target.
  - игриво ласкает хвостик $target.
  - гладит $target по хвосту.
  - гладит хвост $target.
  - водит ладошкой по хвостику $target.
  - водит рукой вдоль хвоста $target.
  icon: _Arcane/Interface/ErpPanel/pat_tail.png
  targetRequirements:
  - !type:SpeciesRequirement
    species:
    - Demon
    - Felinid
    - Vulpkanin
    - Tajaran
    - HumanoidXeno
    - Rodentia

- type: panelInteraction
  id: TailHug
  category: Tail
  name: Сплестись хвостами
  range: 1
  sounds:
  - /Audio/_Arcane/Interactions/friction1.ogg
  - /Audio/_Arcane/Interactions/friction2.ogg
  messages:
  - сплетается хвостиками с $target.
  - обвивает хвост $target своим.
  - игриво ласкает хвостик $target своим.
  - обнимается хвостиками с $target.
  - оплетает хвост $target своим.
  icon: _Arcane/Interface/ErpPanel/tail_hug.png
  targetRequirements:
  - !type:SpeciesRequirement
    species:
    - Demon
    - Felinid
    - Vulpkanin
    - Tajaran
    - HumanoidXeno
    - Rodentia
  userRequirements:
  - !type:SpeciesRequirement
    species:
    - Demon
    - Felinid
    - Vulpkanin
    - Tajaran
    - HumanoidXeno
    - Rodentia

- type: panelInteraction
  id: HighFive
  category: Hands
  name: Дать пять
  range: 1
  sounds:
  - /Audio/_Arcane/Interactions/bang1.ogg
  - /Audio/_Arcane/Interactions/bang2.ogg
  - /Audio/_Arcane/Interactions/bang4.ogg
  - /Audio/_Arcane/Interactions/bang5.ogg
  - /Audio/_Arcane/Interactions/bang6.ogg
  messages:
  - даёт пять $target!
  - ударяет ладошкой по ладошке $target.
  - звонко шлёпает $target по ладошке!
  icon: _Arcane/Interface/ErpPanel/high_five.png

- type: panelInteraction
  id: FriendlyFlyingKiss
  category: Face
  name: Послать воздушный поцелуй
  sounds:
  - /Audio/_Arcane/Interactions/kiss1.ogg
  - /Audio/_Arcane/Interactions/kiss2.ogg
  messages:
  - посылает воздушный поцелуй $target.
  - игриво целует кончики пальцев и посылает $target воздушный поцелуй.
  - нежно дует $target воздушный поцелуй.
  - дует поцелуй в сторону $target с улыбкой.
  - отправляет $target воздушный поцелуй.
  icon: _Arcane/Interface/ErpPanel/friendly_flying_kiss.png

- type: panelInteraction
  id: FriendlyNoseBoop
  category: Face
  name: Дать по носику
  sounds:
  - /Audio/_Arcane/Interactions/pat1.ogg
  messages:
  - тыкает пальчиком в носик $target.
  - игриво дотрагивается до носика $target.
  - легонько тыкает $target по носу.
  - бупает $target по носику.
  - аккуратно нажимает на носик $target.
  icon: _Arcane/Interface/ErpPanel/friendly_nose_boop.png

- type: panelInteraction
  id: FriendlyTailPull
  category: Tail
  name: Потянуть за хвост
  sounds:
  - /Audio/_Arcane/Interactions/pat1.ogg
  messages:
  - игриво дёргает $target за хвост.
  - тянет за кончик хвоста $target.
  - слегка тянет хвостик $target.
  - хватает $target за хвост и несильно тянет.
  - теребит хвостик $target.
  icon: _Arcane/Interface/ErpPanel/friendly_tail_pull.png
  targetRequirements:
  - !type:SpeciesRequirement
    species:
    - Demon
    - Felinid
    - Vulpkanin
    - Tajaran
    - HumanoidXeno
    - Rodentia

- type: panelInteraction
  id: KissHand
  category: Hands
  name: Поцеловать руку
  sounds:
  - /Audio/_Arcane/Interactions/kiss1.ogg
  - /Audio/_Arcane/Interactions/kiss2.ogg
  messages:
  - галантно целует руку $target.
  - нежно берёт руку $target и прикладывает к губам.
  - почтительно целует $target в руку.
  - прикасается губами к тыльной стороне ладони $target.
  - с улыбкой целует руку $target.
  icon: _Arcane/Interface/ErpPanel/kiss_hand.png

- type: panelInteraction
  id: PatShoulder
  category: Shoulders
  name: Похлопать по плечу
  sounds:
  - /Audio/_Arcane/Interactions/pat1.ogg
  - /Audio/_Arcane/Interactions/pat2.ogg
  messages:
  - хлопает $target по плечу.
  - дружески похлопывает $target по плечу.
  - несколько раз хлопает $target по плечу.
  - ободряюще похлопывает $target по плечу.
  - легонько шлёпает $target по плечу.
  icon: _Arcane/Interface/ErpPanel/pat_shoulder.png

- type: panelInteraction
  id: PetHead
  category: Head
  name: Погладить по голове
  sounds:
  - /Audio/_Arcane/Interactions/friction1.ogg
  - /Audio/_Arcane/Interactions/friction2.ogg
  messages:
  - гладит $target по голове.
  - нежно проводит рукой по голове $target.
  - ласково треплет $target по голове.
  - мягко поглаживает голову $target.
  - заботливо гладит $target по головке.
  - проводит ладонью по волосам $target.
  icon: _Arcane/Interface/ErpPanel/pet_head.png

- type: panelInteraction
  id: PlayfulNibble
  category: Neck
  name: Игриво укусить
  sounds:
  - /Audio/_Arcane/Interactions/pat1.ogg
  messages:
  - игриво покусывает $target.
  - тихонько кусает $target.
  - слегка прикусывает $target.
  - игриво цапает $target зубками.
  - нежно жуёт $target.
  icon: _Arcane/Interface/ErpPanel/playful_nibble.png

- type: panelInteraction
  id: HornsPat
  category: Head
  name: Погладить рога
  sounds:
  - /Audio/_Arcane/Interactions/friction1.ogg
  - /Audio/_Arcane/Interactions/friction2.ogg
  messages:
  - гладит рога $target.
  - проводит рукой по рогам $target.
  - восхищённо трогает рога $target.
  - аккуратно поглаживает рог $target.
  - нежно касается рогов $target.
  icon: _Arcane/Interface/ErpPanel/horns_pat.png
  targetRequirements:
  - !type:SpeciesRequirement
    species:
    - Demon

- type: panelInteraction
  id: Kitty
  category: Face
  name: Потереться мордочкой
  sounds:
  - /Audio/_Arcane/Interactions/friction1.ogg
  messages:
  - трётся мордочкой о $target.
  - мурча, трётся щёкой о $target.
  - нежно трётся мордашкой об $target.
  - тычется носиком в $target.
  - игриво трётся о $target щёкой.
  icon: _Arcane/Interface/ErpPanel/kitty.png
  userRequirements:
  - !type:SpeciesRequirement
    species:
    - Felinid
    - Vulpkanin
    - Tajaran
    - HumanoidXeno
    - Rodentia
