- type: panelInteraction
  id: BiteNeck
  category: Neck
  name: Укусить шею
  messages:
  - вцепляется зубами в шею $target!
  - оставляет болезненный укус на шее $target.
  - резко кусает $target за шею.
  - прихватывает шею $target зубами.
  - впивается клыками в шею $target.
  - медленно кусает $target за шею.
  - оставляет след от укуса на шее $target.
  - прикусывает шею $target.
  icon: _Arcane/Interface/ErpPanel/bite_neck.png
  tags:
  - RequiresERP

- type: panelInteraction
  id: LickNeck
  category: Neck
  name: Облизать шею
  targetArouse: 3
  messages:
  - едва касаясь кожи, проводит языком вдоль шеи $target.
  - оставляет медленный влажный след на шее $target.
  - дразняще касается языком шеи $target.
  - мягко облизывает чувствительное место на шее $target.
  - проводит кончиком языка по шее $target, вызывая мурашки.
  - неторопливо скользит языком вдоль шеи $target.
  - игриво прихватывает губами шею $target, проводя языком по коже.
  - нежно касается языком шеи $target, будто пробуя её на вкус.
  - медленно проводит языком под ухом $target.
  - оставляет лёгкий поцелуй и след языка на шее $target.
  icon: _Arcane/Interface/ErpPanel/lick_neck.png
  tags:
  - RequiresERP

- type: panelInteraction
  id: KissNeck
  category: Neck
  name: Поцеловать шею
  targetArouse: 3
  messages:
  - мягко прижимается губами к шее $target.
  - оставляет короткий нежный поцелуй на шее $target.
  - медленно покрывает шею $target лёгкими поцелуями.
  - касается губами кожи шеи $target, задерживаясь на мгновение.
  - оставляет тёплый поцелуй под ухом $target.
  - ласково целует шею $target, вызывая дрожь.
  - осыпает шею $target короткими поцелуями.
  - игриво целует шею $target, едва касаясь кожи.
  - нежно целует чувствительное место на шее $target.
  - оставляет долгий поцелуй на шее $target.
  icon: _Arcane/Interface/ErpPanel/kiss_neck.png
  tags:
  - RequiresERP

- type: panelInteraction
  id: ShoulderMassage
  category: Shoulders
  name: Помассировать плечи
  messages:
  - мягко разминает плечи $target.
  - осторожно массирует напряжённые плечи $target.
  - проводит ладонями по плечам $target, снимая напряжение.
  - медленно массирует шею и плечи $target.
  - нежно надавливает пальцами на плечи $target.
  - ласково разминает мышцы плеч $target.
  - успокаивающе массирует плечи $target.
  - проводит руками вдоль плеч $target, расслабляя их.
  - аккуратно массирует плечи $target круговыми движениями.
  - заботливо разминает плечи $target.
  selfMessages:
  - устало разминает собственные плечи.
  - медленно массирует себе плечи, расслабляясь.
  - потирает собственные плечи, снимая напряжение.
  - осторожно разминает затёкшие плечи.
  - довольно массирует собственные плечи.
  icon: _Arcane/Interface/ErpPanel/shoulder_massage.png

- type: panelInteraction
  id: NuzzleNeck
  category: Neck
  name: Уткнуться в шею
  targetArouse: 3
  sounds:
  - /Audio/_Arcane/Interactions/friction1.ogg
  messages:
  - уютно утыкается носом в шею $target.
  - нежно тычется в шею $target.
  - прижимается лицом к шее $target.
  - мягко утыкается в шею $target.
  - уткнувшись, прижимается к шее $target.
  icon: _Arcane/Interface/ErpPanel/nuzzle_neck.png
  tags:
  - RequiresERP

- type: panelInteraction
  id: NuzzleNeckVulpa
  category: Neck
  name: Ткнуться мордочкой в шею
  targetArouse: 3
  sounds:
  - /Audio/_Arcane/Interactions/friction1.ogg
  messages:
  - тычет мордочкой в шею $target.
  - нежно тычется носом в шею $target.
  - утыкается мордашкой в шею $target, мурча.
  - прижимает мордочку к шее $target.
  - водит носиком по шее $target.
  icon: _Arcane/Interface/ErpPanel/nuzzle_neck_vulpa.png
  tags:
  - RequiresERP
  userRequirements:
  - !type:SpeciesRequirement
    species:
    - Felinid
    - Vulpkanin
    - Tajaran
    - HumanoidXeno
    - Rodentia

- type: panelInteraction
  id: BlowSlap
  category: Face
  name: Дать пощёчину
  sounds:
  - /Audio/_Arcane/Interactions/bang1.ogg
  - /Audio/_Arcane/Interactions/bang2.ogg
  - /Audio/_Arcane/Interactions/bang3.ogg
  messages:
  - отвешивает пощёчину $target!
  - резко бьёт $target по щеке.
  - звонко даёт пощёчину $target.
  - хлёстко бьёт $target по щеке.
  - с размаху шлёпает $target по щеке.
  icon: _Arcane/Interface/ErpPanel/blow_slap.png
